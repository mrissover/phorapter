# Local development stack: Qdrant + Ollama + phorapter.
# Bring it up with `docker compose -f docker-compose.dev.yml up`.
# The one-shot `ollama-pull` service pulls the default embedding model, then exits.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:0.5.4
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 3 && ollama pull nomic-embed-text"]
    restart: "no"

  phorapter:
    build: .
    depends_on:
      - qdrant
      - ollama
    ports:
      - "8000:8000"
    environment:
      PHORAPTER_STORE__URL: http://qdrant:6333
      PHORAPTER_EMBEDDER__PROVIDER: ollama
      PHORAPTER_EMBEDDER__MODEL: nomic-embed-text
      PHORAPTER_EMBEDDER__BASE_URL: http://ollama:11434

volumes:
  qdrant_data:
  ollama_data:
